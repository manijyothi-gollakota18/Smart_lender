<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Lender - Machine learning powered loan eligibility prediction platform. Predict loan approvals in real-time.">
    <title>Smart Lender | Loan Eligibility Predictor</title>
    <!-- Fonts and Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Loader overlay -->
    <div id="loader-wrapper" class="loader-wrapper">
        <div class="loader"></div>
        <h3 style="color: white; font-weight: 500; letter-spacing: 0.05em;">Evaluating Creditworthiness...</h3>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">Running XGBoost Classification Model</p>
    </div>

    <header>
        <div class="nav-container">
            <a href="/" class="logo">
                <i class="fa-solid fa-building-columns"></i> SMART LENDER
            </a>
            <ul class="nav-links">
                <li><a href="/" class="{{ 'active' if request.path == '/' else '' }}">Home</a></li>
                <li><a href="/predict" class="{{ 'active' if request.path == '/predict' else '' }}">Predict Eligibility</a></li>
                <li><a href="/insights" class="{{ 'active' if request.path == '/insights' else '' }}">Insights & EDA</a></li>
            </ul>
        </div>
    </header>

    <main class="animate-fade-in">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Smart Lender Platform. Powered by Flask & XGBoost. All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
