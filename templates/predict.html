{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <div style="text-align: center; margin-bottom: 2.5rem;">
        <h1 style="font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #fff, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Applicant Details Form</h1>
        <p style="color: var(--text-secondary);">Enter the financial and demographic details of the applicant to predict loan eligibility.</p>
    </div>

    <!-- Quick Scenario Presets -->
    <div class="glass-card" style="margin-bottom: 2rem; padding: 1.5rem; border-color: rgba(99, 102, 241, 0.2);">
        <h4 style="margin-bottom: 1rem; font-size: 1rem; color: #c084fc; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">Quick Scenario Presets</h4>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <button type="button" class="btn btn-secondary" onclick="loadScenario('low-risk')" style="padding: 0.5rem 1rem; font-size: 0.85rem;">
                <i class="fa-solid fa-user-check" style="color: var(--success);"></i> Scenario 1: Low-Risk Fast-Track
            </button>
            <button type="button" class="btn btn-secondary" onclick="loadScenario('high-risk')" style="padding: 0.5rem 1rem; font-size: 0.85rem;">
                <i class="fa-solid fa-user-slash" style="color: var(--danger);"></i> Scenario 2: High-Risk Detection
            </button>
            <button type="button" class="btn btn-secondary" onclick="loadScenario('average')" style="padding: 0.5rem 1rem; font-size: 0.85rem;">
                <i class="fa-solid fa-user-clock" style="color: var(--primary);"></i> Scenario 3: Standard Evaluation
            </button>
        </div>
    </div>

    <form id="prediction-form" action="/predict" method="POST" class="glass-card">
        <div class="form-grid">
            <!-- Gender -->
            <div class="form-group">
                <label for="gender">Gender</label>
                <select name="gender" id="gender" class="form-control" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <!-- Married -->
            <div class="form-group">
                <label for="married">Married</label>
                <select name="married" id="married" class="form-control" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <!-- Dependents -->
            <div class="form-group">
                <label for="dependents">Dependents</label>
                <select name="dependents" id="dependents" class="form-control" required>
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3+">3+</option>
                </select>
            </div>

            <!-- Education -->
            <div class="form-group">
                <label for="education">Education</label>
                <select name="education" id="education" class="form-control" required>
                    <option value="Graduate">Graduate</option>
                    <option value="Not Graduate">Not Graduate</option>
                </select>
            </div>

            <!-- Self Employed -->
            <div class="form-group">
                <label for="self_employed">Self Employed</label>
                <select name="self_employed" id="self_employed" class="form-control" required>
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
            </div>

            <!-- Property Area -->
            <div class="form-group">
                <label for="property_area">Property Area</label>
                <select name="property_area" id="property_area" class="form-control" required>
                    <option value="Semiurban">Semiurban</option>
                    <option value="Urban">Urban</option>
                    <option value="Rural">Rural</option>
                </select>
            </div>

            <!-- Applicant Income -->
            <div class="form-group">
                <label for="applicant_income">Applicant Monthly Income ($)</label>
                <input type="number" name="applicant_income" id="applicant_income" class="form-control" placeholder="e.g. 5000" min="0" required>
            </div>

            <!-- Coapplicant Income -->
            <div class="form-group">
                <label for="coapplicant_income">Coapplicant Monthly Income ($)</label>
                <input type="number" name="coapplicant_income" id="coapplicant_income" class="form-control" placeholder="e.g. 1500 (or 0)" min="0" required>
            </div>

            <!-- Loan Amount -->
            <div class="form-group">
                <label for="loan_amount">Loan Amount (in Thousands, e.g. 120 = $120k)</label>
                <input type="number" name="loan_amount" id="loan_amount" class="form-control" placeholder="e.g. 150" min="1" required>
            </div>

            <!-- Loan Term -->
            <div class="form-group">
                <label for="loan_term">Loan Amount Term (in Days, e.g. 360)</label>
                <input type="number" name="loan_term" id="loan_term" class="form-control" placeholder="e.g. 360" min="12" required>
            </div>

            <!-- Credit History -->
            <div class="form-group" style="grid-column: span 2;">
                <label for="credit_history">Credit History Status</label>
                <select name="credit_history" id="credit_history" class="form-control" required>
                    <option value="1.0">Good Credit History (No past defaults)</option>
                    <option value="0.0">Bad Credit History (Past defaults or no history)</option>
                </select>
            </div>
        </div>

        <div style="text-align: center; margin-bottom: 1.5rem;" id="total-income-display" class="detail-item">
            Total Monthly Income: $0.00
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary" style="width: 100%; max-width: 300px; justify-content: center;">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Evaluate Application
            </button>
        </div>
    </form>
</div>

<script>
function loadScenario(type) {
    if (type === 'low-risk') {
        document.getElementById('gender').value = 'Male';
        document.getElementById('married').value = 'Yes';
        document.getElementById('dependents').value = '2';
        document.getElementById('education').value = 'Graduate';
        document.getElementById('self_employed').value = 'No';
        document.getElementById('property_area').value = 'Semiurban';
        document.getElementById('applicant_income').value = 7500;
        document.getElementById('coapplicant_income').value = 2500;
        document.getElementById('loan_amount').value = 150;
        document.getElementById('loan_term').value = 360;
        document.getElementById('credit_history').value = '1.0';
    } else if (type === 'high-risk') {
        document.getElementById('gender').value = 'Female';
        document.getElementById('married').value = 'No';
        document.getElementById('dependents').value = '0';
        document.getElementById('education').value = 'Not Graduate';
        document.getElementById('self_employed').value = 'Yes';
        document.getElementById('property_area').value = 'Rural';
        document.getElementById('applicant_income').value = 2200;
        document.getElementById('coapplicant_income').value = 0;
        document.getElementById('loan_amount').value = 300; // very high relative to income
        document.getElementById('loan_term').value = 180;
        document.getElementById('credit_history').value = '0.0';
    } else if (type === 'average') {
        document.getElementById('gender').value = 'Male';
        document.getElementById('married').value = 'Yes';
        document.getElementById('dependents').value = '1';
        document.getElementById('education').value = 'Graduate';
        document.getElementById('self_employed').value = 'No';
        document.getElementById('property_area').value = 'Urban';
        document.getElementById('applicant_income').value = 4500;
        document.getElementById('coapplicant_income').value = 1500;
        document.getElementById('loan_amount').value = 120;
        document.getElementById('loan_term').value = 360;
        document.getElementById('credit_history').value = '1.0';
    }

    // Trigger total income recalculation
    const event = new Event('input');
    document.getElementById('applicant_income').dispatchEvent(event);
}
</script>
{% endblock %}
